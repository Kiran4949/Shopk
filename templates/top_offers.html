{% extends 'base.html' %} 

{% load static %} 

{% block title %}Top Offers{% endblock title %} 

{% block main-content %}

<div class="container my-5 mt-3">
  <div class="row">
    <div class="col-sm-4">
      <div class="list-group">
        <a href=" # " class="list-group-item list-group-item-action" aria-current="true"> Fashion Top Deals </a>
      </div>
    </div>
    <div class="col-md-8">
      <div class="row">
        {% for product in topoffers %}
        <div class="col-md-4 col-6 mb-4">
          <a href=" {% url 'product-detail' product.id %} " class="btn">
            <div class="item">
              <img src=" {{product.product_image.url}} " alt="" style="width: 140px; margin-top: 8px" height="auto" class="" />
              <div class="fw-bold">{{product.title}}</div>
              <div class="fw-bold">
                {{product.discounted_price}}
                <small class="fw-light text-decoration-line-through"> {{product.selling_price}}</small>
              </div>
            </div>
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>

{% endblock main-content %}
